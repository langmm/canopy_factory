{% set name = "canopy_factory" %}
{% set version = "0.0.1" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://pypi.io/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: XXX

build:
  number: 0
  script: {{ PYTHON }} -m pip install . --no-deps -vv
  entry_points:
    - canopy_factory = canopy_factory.__main__:main

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - setuptools
    - setuptools_scm
    # pyembree build dependencies
    - cmake
    - cython
    - tbb
    - tbb-devel
  host:
    - python
    - pip
  run:
    # - hothouse>=0.1.0
    # - ePhotosynthesis_C  # Once this is released
    - ffmpeg
    - imageio
    - matplotlib>=3.10.0
    - numpy>=1.13.0,<2.0
    # - openalea.lpy
    - pandas
    - pvlib>=0.7.2
    # - pyembree
    - pyshp
    - python
    - pyyaml
    - scipy
    - sundials>=5.7.0  # For building ePhotosynthesis_C
    - yggdrasil
    # - yggdrasil-python-rapidjson

test:
  imports:
    - canopy_factory
  commands:
    - canopy_factory --help

about:
  home: https://github.com/langmm/canopy_factory
  license: GPL-3.0-or-later
  license_file: LICENSE
  license_family: GPL
  summary: Toolkit for generating & analyzing 3D crop canopies
  doc_url: https://langmm.github.io/canopy_factory/
  dev_url: https://github.com/langmm/canopy_factory

extra:
  recipe-maintainers:
    - langmm
